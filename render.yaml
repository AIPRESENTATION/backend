# AMS Pro — Backend API (Render)
# https://render.com/docs/blueprint-spec
#
# Deploy: connect repo → Render reads this file → creates web service
# Database stays on Supabase (not Render)

services:
  - type: web
    name: ams-pro-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
